<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta property="og:title" content="减脂挑战赛排行榜 🏆">
<meta property="og:description" content="2026年5月6日-6月20日 · 冠军：王俊减重6.75kg！聚餐费用自动分摊，点开查看排行榜">
<meta property="og:image" content="https://liqianshu520-png.github.io/slim-challenge/preview.png">
<meta property="og:url" content="https://liqianshu520-png.github.io/slim-challenge/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<title>🏋️ 减脂挑战赛排行榜</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#FFD700;--silver:#C0C0C0;--bronze:#CD7F32;
  --green:#4ade80;--red:#f87171;--blue:#60a5fa;--purple:#a78bfa;
  --card:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.12);
  --text:rgba(255,255,255,0.9);--muted:rgba(255,255,255,0.5);
}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;
  background:#0a0a1a;
  min-height:100vh;color:var(--text);overflow-x:hidden;
}

/* ── BACKGROUND ── */
#bg-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:200}

/* ── LAYOUT ── */
.app{position:relative;z-index:1;max-width:500px;margin:0 auto;padding:24px 16px 80px}

/* ── WELCOME OVERLAY ── */
#welcome{
  position:fixed;inset:0;z-index:300;
  background:radial-gradient(ellipse at center,#1a0533 0%,#000 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:24px;cursor:pointer;
}
#welcome.hidden{display:none}
.w-crown{font-size:90px;animation:pop .6s cubic-bezier(.34,1.56,.64,1) both}
.w-title{
  font-size:30px;font-weight:800;margin:16px 0 8px;
  background:linear-gradient(135deg,var(--gold),#ff8c00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:slideUp .6s ease .3s both;
}
.w-sub{font-size:17px;color:rgba(255,255,255,.75);animation:slideUp .6s ease .5s both}
.w-skip{
  position:absolute;bottom:36px;
  font-size:13px;color:rgba(255,255,255,.4);
  border:1px solid rgba(255,255,255,.15);padding:8px 24px;border-radius:20px;
  animation:slideUp .6s ease .8s both;
}
.w-stars{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

/* ── HEADER ── */
.header{text-align:center;padding:8px 0 24px}
.logo-anim{font-size:52px;display:inline-block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
.app-name{
  font-size:26px;font-weight:800;
  background:linear-gradient(135deg,var(--gold),#ff6b6b,var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin:6px 0 10px;
}
.period-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.3);
  border-radius:20px;padding:5px 16px;font-size:13px;color:var(--purple);
}

/* ── COUNTDOWN / DATES ── */
.date-bar{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:14px 18px;margin:14px 0;
}
.date-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);margin-bottom:8px}
.prog-bar{height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.prog-fill{
  height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));
  border-radius:4px;transition:width 1.5s ease;
}
.days-left{text-align:center;margin-top:10px;font-size:13px;color:var(--muted)}
.days-left b{color:var(--blue);font-size:18px}

/* ── CHAMPION BANNER ── */
.champ-banner{
  background:linear-gradient(135deg,rgba(255,215,0,.12),rgba(255,140,0,.08));
  border:1px solid rgba(255,215,0,.3);border-radius:20px;
  padding:24px;text-align:center;margin:16px 0;
  animation:glow 3s ease-in-out infinite;
}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(255,215,0,.15)}50%{box-shadow:0 0 40px rgba(255,215,0,.35)}}
.champ-icon{font-size:52px;animation:spin3d 4s ease-in-out infinite}
@keyframes spin3d{0%,100%{transform:rotateY(0) scale(1)}50%{transform:rotateY(180deg) scale(1.1)}}
.champ-tag{font-size:11px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin:8px 0 4px}
.champ-name{font-size:28px;font-weight:800;color:var(--gold)}
.champ-stat{font-size:14px;color:rgba(255,215,0,.75);margin-top:4px}
.pending-badge{
  background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);
  border-radius:10px;padding:10px 16px;font-size:13px;color:#fbbf24;
  text-align:center;margin:12px 0;
}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:16px 0}
.stat{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:14px 6px;text-align:center;
}
.stat-val{font-size:20px;font-weight:700;color:var(--purple)}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px}

/* ── SECTION TITLE ── */
.sec-title{
  font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;gap:10px;margin:24px 0 12px;
}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── LEADERBOARD CARDS ── */
.p-card{
  background:var(--card);border:1px solid var(--border);border-radius:18px;
  padding:16px;margin-bottom:10px;
  display:flex;align-items:center;gap:14px;
  opacity:0;transform:translateY(24px);
  transition:opacity .4s ease,transform .4s ease,border-color .3s,background .3s;
}
.p-card.visible{opacity:1;transform:translateY(0)}
.p-card.r1{border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.06)}
.p-card.r2{border-color:rgba(192,192,192,.35)}
.p-card.r3{border-color:rgba(205,127,50,.35)}
.p-card.pending{border-color:rgba(255,255,255,.06);opacity:.55}
.p-card.pending.visible{opacity:.55}

.rank-badge{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;flex-shrink:0;
}
.r1 .rank-badge{background:var(--gold);color:#000}
.r2 .rank-badge{background:var(--silver);color:#000}
.r3 .rank-badge{background:var(--bronze);color:#000}
.r4 .rank-badge,.pending .rank-badge{background:rgba(255,255,255,.08);color:var(--muted);font-size:15px}

.p-emoji{font-size:32px;flex-shrink:0}
.p-info{flex:1;min-width:0}
.p-name{font-size:16px;font-weight:600}
.w-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.w-bar{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.w-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:3px;transition:width 1.2s ease}
.w-text{font-size:11px;color:var(--muted);white-space:nowrap}

.p-loss{text-align:right;flex-shrink:0}
.loss-num{font-size:22px;font-weight:700;color:var(--green);line-height:1}
.loss-pct{font-size:11px;color:var(--muted);margin-top:2px}
.loss-pending{font-size:12px;color:rgba(255,255,255,.25)}

/* ── PAYMENT SECTION ── */
.payment-box{
  background:linear-gradient(135deg,rgba(96,165,250,.08),rgba(167,139,250,.08));
  border:1px solid rgba(96,165,250,.2);border-radius:20px;
  padding:20px;margin:20px 0;
}
.pay-title{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.meal-input-wrap{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.meal-input{
  flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);
  border-radius:10px;color:#fff;padding:10px 14px;font-size:16px;outline:none;
  transition:border-color .2s;
}
.meal-input:focus{border-color:var(--purple)}
.meal-input::placeholder{color:rgba(255,255,255,.25)}
.yuan{font-size:14px;color:var(--muted)}

.pay-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05);
}
.pay-row:last-child{border-bottom:none}
.pay-who{display:flex;align-items:center;gap:8px;font-size:15px}
.pay-sub{font-size:11px;color:var(--muted)}
.pay-amt.free{font-size:17px;font-weight:700;color:var(--green)}
.pay-amt.owe{font-size:17px;font-weight:700;color:var(--red)}
.pay-pct{font-size:11px;color:var(--muted);display:block}

/* ── SHARE BUTTON ── */
.share-wrap{text-align:center;margin:28px 0 12px}
.share-btn{
  background:linear-gradient(135deg,#11998e,#38ef7d);
  color:#fff;border:none;padding:15px 40px;border-radius:16px;
  font-size:16px;font-weight:700;cursor:pointer;
  box-shadow:0 6px 20px rgba(17,153,142,.4);
  transition:transform .15s,box-shadow .15s;
  width:100%;max-width:320px;
}
.share-btn:active{transform:scale(.97);box-shadow:0 3px 12px rgba(17,153,142,.3)}

/* ── ADMIN PANEL ── */
.admin-toggle{text-align:center;margin:8px 0}
.admin-open-btn{
  background:none;border:1px solid rgba(255,255,255,.12);
  color:var(--muted);padding:8px 20px;border-radius:20px;font-size:13px;cursor:pointer;
  transition:all .2s;
}
.admin-open-btn:hover{border-color:var(--purple);color:var(--purple)}

.admin-box{
  background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:20px;margin:12px 0;display:none;
}
.admin-box.open{display:block}

.form-lbl{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px}
.form-inp{
  width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:10px;color:#fff;padding:10px 14px;font-size:15px;outline:none;
  transition:border-color .2s;margin-bottom:12px;
}
.form-inp:focus{border-color:var(--purple)}
.form-inp::placeholder{color:rgba(255,255,255,.25)}

.p-row{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:12px;padding:12px;margin-bottom:8px;
}
.p-row-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.w-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;align-items:end}
.calc-val{
  padding:10px 0 2px;font-weight:700;font-size:16px;
  color:var(--green);
}
.calc-val.neg{color:var(--red)}
.calc-val.empty{color:rgba(255,255,255,.2);font-weight:400;font-size:14px}

.btn-save{
  width:100%;background:linear-gradient(135deg,var(--purple),var(--blue));
  color:#fff;border:none;padding:13px;border-radius:12px;
  font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;
  transition:opacity .2s;
}
.btn-save:hover{opacity:.9}
.btn-del{
  background:rgba(248,113,113,.15);color:var(--red);
  border:1px solid rgba(248,113,113,.25);padding:5px 12px;
  border-radius:8px;font-size:12px;cursor:pointer;
}
.btn-add{
  background:rgba(167,139,250,.15);color:var(--purple);
  border:1px solid rgba(167,139,250,.25);padding:6px 14px;
  border-radius:8px;font-size:13px;cursor:pointer;
}
.btn-logout{
  background:none;border:1px solid rgba(255,255,255,.1);color:var(--muted);
  padding:8px 20px;border-radius:10px;font-size:13px;cursor:pointer;
  width:100%;margin-top:10px;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:30px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:rgba(0,0,0,.85);color:#fff;
  padding:12px 24px;border-radius:25px;font-size:14px;
  z-index:400;transition:transform .3s;
  backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);
  white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── ANIMATIONS ── */
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<!-- ── WELCOME OVERLAY ── -->
<div id="welcome" onclick="closeWelcome()">
  <canvas class="w-stars" id="star-canvas"></canvas>
  <div class="w-crown" id="w-crown">🏆</div>
  <img id="w-photo" src="" alt="" style="
    width:130px;height:130px;border-radius:50%;object-fit:cover;
    border:4px solid #FFD700;box-shadow:0 0 30px rgba(255,215,0,.6);
    margin:10px 0;animation:pop .6s cubic-bezier(.34,1.56,.64,1) .2s both;display:none;
  ">
  <div class="w-title" id="w-title">恭喜冠军！</div>
  <div class="w-sub" id="w-sub">减脂挑战赛结束啦！</div>
  <div class="w-skip">点击任意处继续 →</div>
</div>

<canvas id="bg-canvas"></canvas>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-anim">🏋️</div>
    <div class="app-name">减脂挑战赛</div>
    <div class="period-pill">
      <span>📅</span>
      <span id="period-label">2025年减脂挑战</span>
    </div>
  </div>

  <!-- DATE PROGRESS -->
  <div class="date-bar" id="date-bar">
    <div class="date-row">
      <span id="start-lbl">🚀 开始</span>
      <span id="prog-pct">0%</span>
      <span id="end-lbl">🏁 结束</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="days-left" id="days-left"></div>
  </div>

  <!-- CHAMPION BANNER -->
  <div class="champ-banner" id="champ-banner" style="display:none">
    <div class="champ-icon" id="champ-icon">🏆</div>
    <img id="champ-photo" src="" alt="" style="
      width:90px;height:90px;border-radius:50%;object-fit:cover;
      border:3px solid #FFD700;box-shadow:0 0 20px rgba(255,215,0,.5);
      margin:10px auto;display:none;
    ">
    <div class="champ-tag">本期冠军</div>
    <div class="champ-name" id="champ-name">-</div>
    <div class="champ-stat" id="champ-stat">-</div>
  </div>

  <!-- PENDING NOTICE -->
  <div class="pending-badge" id="pending-notice" style="display:none">
    ⏳ <span id="pending-names"></span> 还未录入结束体重，等待结算…
  </div>

  <!-- STATS ROW -->
  <div class="stats-row">
    <div class="stat">
      <div class="stat-val" id="s-count">4</div>
      <div class="stat-lbl">参赛人数</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="s-total">-</div>
      <div class="stat-lbl">总减重</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="s-avg">-</div>
      <div class="stat-lbl">人均减重</div>
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div class="sec-title">🏅 实时排行榜</div>
  <div id="board"></div>

  <!-- PAYMENT SECTION -->
  <div class="payment-box" id="pay-box" style="display:none">
    <div class="pay-title">💰 聚餐费用分摊</div>
    <div class="meal-input-wrap">
      <input type="number" class="meal-input" id="meal-cost" placeholder="输入聚餐总费用" min="0" step="10" oninput="renderPayments()">
      <span class="yuan">元</span>
    </div>
    <div id="pay-list"></div>
  </div>


  <!-- VERSION LOG -->
  <div id="ver-box" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;margin:16px 0">
    <div style="font-size:12px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:10px">📋 更新记录</div>
    <div id="ver-list"></div>
  </div>
  <!-- SHARE -->
  <div class="share-wrap">
    <button class="share-btn" onclick="copyFixed()">📤 复制链接发群里</button>
  </div>

  <!-- ADMIN PLACEHOLDER (hidden) -->
  <div style="display:none" id="admin-box">
    <!-- AUTH VIEW -->
    <div id="auth-view">
      <div style="margin-bottom:12px">
        <label class="form-lbl">管理员密码</label>
        <input type="password" class="form-inp" id="pwd-inp" placeholder="默认密码：1234" onkeypress="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn-save" onclick="doLogin()">🔑 进入管理</button>
    </div>
    <!-- ADMIN VIEW -->
    <div id="admin-view" style="display:none">
      <div class="sec-title" style="margin-top:0">📋 活动设置</div>
      <label class="form-lbl">活动名称</label>
      <input type="text" class="form-inp" id="a-name" placeholder="2025年1月减脂挑战">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <label class="form-lbl">开始日期</label>
          <input type="date" class="form-inp" id="a-start">
        </div>
        <div>
          <label class="form-lbl">结束日期</label>
          <input type="date" class="form-inp" id="a-end">
        </div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin:8px 0">
        <div class="sec-title" style="margin:0;flex:1">👥 选手管理</div>
        <button class="btn-add" onclick="addPlayer()">+ 添加</button>
      </div>
      <div id="admin-players"></div>

      <button class="btn-save" onclick="doSave()">💾 保存并更新</button>
      <button class="btn-logout" onclick="doLogout()">退出管理</button>
    </div>
  </div>

</div><!-- /app -->

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  DATA  (pre-filled from 参赛人员.xlsx)
// ─────────────────────────────────────────────
const EMOJIS=['🐼','🦊','🐯','🦁','🐻','🦄','🔥','💪','🌟','🐸'];
const PAY_RATIO=[0.1,0.2,0.3,0.4]; // rank 1=10%, 2=20%, 3=30%, 4=40%

let D={

let authed=false;

// ─────────────────────────────────────────────
//  LOAD from URL hash or localStorage
// ─────────────────────────────────────────────
function loadData(){
  const h=location.hash;
  if(h&&h.length>1){
    try{
      const j=JSON.parse(atob(decodeURIComponent(h.slice(1))));
      Object.assign(D,j);return;
    }catch(_){}
  }
  try{
    const s=localStorage.getItem('slimChallenge');
    if(s)Object.assign(D,JSON.parse(s));
  }catch(_){}
}

function saveData(){
  localStorage.setItem('slimChallenge',JSON.stringify(D));
}

function getShareURL(){
  const enc=encodeURIComponent(btoa(JSON.stringify(D)));
  return location.origin+location.pathname+'#'+enc;
}

// ─────────────────────────────────────────────
//  CALCULATIONS
// ─────────────────────────────────────────────
function ranked(){
  return D.players.map(p=>{
    const loss=(p.sw&&p.ew!==null&&p.ew!==undefined)?+(p.sw-p.ew).toFixed(2):null;
    const pct=loss!==null?+(loss/p.sw*100).toFixed(2):null;
    return{...p,loss,pct,done:loss!==null};
  }).sort((a,b)=>{
    if(a.done&&b.done)return b.pct-a.pct;
    if(a.done)return -1;
    if(b.done)return 1;
    return 0;
  });
}

function isOver(){
  if(!D.endDate)return false;
  return new Date()>new Date(D.endDate);
}

function progress(){
  if(!D.startDate||!D.endDate)return 0;
  const s=new Date(D.startDate),e=new Date(D.endDate),n=new Date();
  if(n<=s)return 0;if(n>=e)return 100;
  return Math.round((n-s)/(e-s)*100);
}

function daysLeft(){
  if(!D.endDate)return null;
  return Math.ceil((new Date(D.endDate)-new Date())/(86400000));
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function render(){
  const r=ranked();
  const done=r.filter(p=>p.done);
  const pending=r.filter(p=>!p.done);
  const over=isOver();
  const champion=done[0]||null;

  // Period label
  document.getElementById('period-label').textContent=D.name||'减脂挑战';

  // Date progress
  if(D.startDate&&D.endDate){
    document.getElementById('start-lbl').textContent='🚀 '+D.startDate;
    document.getElementById('end-lbl').textContent='🏁 '+D.endDate;
    const pct=progress();
    document.getElementById('prog-pct').textContent=pct+'%';
    setTimeout(()=>document.getElementById('prog-fill').style.width=pct+'%',100);
    const dl=daysLeft();
    if(dl!==null){
      document.getElementById('days-left').innerHTML=
        dl>0?`距结算还有 <b>${dl}</b> 天`:`<b style="color:var(--green)">活动已结束 🎉</b>`;
    }
    document.getElementById('date-bar').style.display='block';
  } else {
    document.getElementById('date-bar').style.display='none';
  }

  // Champion banner
  if(champion&&(over||pending.length===0)){
    document.getElementById('champ-banner').style.display='block';
    document.getElementById('champ-icon').textContent=champion.emoji;
    document.getElementById('champ-name').textContent=champion.emoji+' '+champion.name;
    document.getElementById('champ-stat').textContent=`体重下降 ${champion.pct}%，减重 ${champion.loss} kg`;
    const cp=document.getElementById('champ-photo');
    const cps=D.photos&&D.photos[champion.name];
    if(cps){cp.src=cps;cp.style.display='block';}else{cp.style.display='none';}
  } else {
    document.getElementById('champ-banner').style.display='none';
  }

  // Pending notice
  if(pending.length>0){
    document.getElementById('pending-notice').style.display='block';
    document.getElementById('pending-names').textContent=pending.map(p=>p.name).join('、');
  } else {
    document.getElementById('pending-notice').style.display='none';
  }

  // Stats
  document.getElementById('s-count').textContent=D.players.length;
  const total=done.reduce((s,p)=>s+p.loss,0);
  const avg=done.length?total/done.length:0;
  document.getElementById('s-total').textContent=done.length?total.toFixed(1)+'kg':'—';
  document.getElementById('s-avg').textContent=done.length?avg.toFixed(1)+'kg':'—';

  // Board
  const board=document.getElementById('board');
  board.innerHTML='';
  const maxLoss=Math.max(...done.map(p=>p.loss),0.01);
  r.forEach((p,i)=>{
    const rk=done.indexOf(p);
    const rkClass=rk===0?'r1':rk===1?'r2':rk===2?'r3':p.done?'r4':'';
    const medal=rk===0?'🥇':rk===1?'🥈':rk===2?'🥉':(p.done?(rk+1):'?');
    const bw=p.done?(p.loss/maxLoss*100):0;
    const card=document.createElement('div');
    card.className=`p-card ${rkClass} ${!p.done?'pending':''}`;
    card.innerHTML=`
      <div class="rank-badge">${medal}</div>
      <div class="p-emoji">${p.emoji}</div>
      <div class="p-info">
        <div class="p-name">${p.name}</div>
        <div class="w-row">
          <div class="w-bar"><div class="w-fill" style="width:0%" data-w="${bw}"></div></div>
          <div class="w-text">${p.sw}→${p.ew!==null&&p.ew!==undefined?p.ew:'?'}kg</div>
        </div>
      </div>
      <div class="p-loss">
        ${p.done
          ?`<div class="loss-num">↓${p.pct}%</div><div class="loss-pct">-${p.loss}kg</div>`
          :`<div class="loss-pending">待统计</div>`}
      </div>`;
    board.appendChild(card);
    setTimeout(()=>{
      card.classList.add('visible');
      const fill=card.querySelector('.w-fill');
      if(fill)fill.style.width=fill.dataset.w+'%';
    },80+i*100);
  });

  // Payment
  if(done.length>=2){
    document.getElementById('pay-box').style.display='block';
    if(D.mealCost)document.getElementById('meal-cost').value=D.mealCost;
    renderPayments();
  } else {
    document.getElementById('pay-box').style.display='none';
  }


  // Version log
  const vl=document.getElementById('ver-list');
  if(vl&&D.changelog){
    vl.innerHTML=D.changelog.map(c=>`
      <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)">
        <div>
          <span style="background:rgba(167,139,250,.2);color:#a78bfa;font-size:11px;padding:2px 8px;border-radius:8px;margin-right:8px">${c.ver}</span>
          <span style="font-size:13px;color:rgba(255,255,255,.7)">${c.note}</span>
        </div>
        <span style="font-size:11px;color:rgba(255,255,255,.3);white-space:nowrap;margin-left:12px">${c.date}</span>
      </div>`).join('');
  }
  // Admin fields if authed
  if(authed)fillAdmin();
}

function renderPayments(){
  const cost=parseFloat(document.getElementById('meal-cost').value)||0;
  D.mealCost=cost;
  const r=ranked().filter(p=>p.done);
  const list=document.getElementById('pay-list');
  list.innerHTML='';
  r.forEach((p,i)=>{
    const ratio=PAY_RATIO[i]!==undefined?PAY_RATIO[i]:0;
    const amt=Math.round(ratio*cost);
    const div=document.createElement('div');
    div.className='pay-row';
    div.innerHTML=`
      <div class="pay-who">
        <span>${p.emoji}</span>
        <div>
          <div>${p.name}</div>
          <div class="pay-sub">↓${p.pct}%（第${i+1}名）· 减${p.loss}kg</div>
        </div>
      </div>
      <div class="pay-amt ${i===0?'free':'owe'}">¥${amt}<span class="pay-pct">${Math.round(ratio*100)}%</span></div>`;
    list.appendChild(div);
  });
}

// ─────────────────────────────────────────────
//  ADMIN
// ─────────────────────────────────────────────
function toggleAdmin(){
  const box=document.getElementById('admin-box');
  box.classList.toggle('open');
}

function doLogin(){
  const v=document.getElementById('pwd-inp').value;
  if(v==='1234'||v==='admin'){
    authed=true;
    document.getElementById('auth-view').style.display='none';
    document.getElementById('admin-view').style.display='block';
    fillAdmin();
  } else { toast('密码错误 ❌'); }
}

function doLogout(){
  authed=false;
  document.getElementById('auth-view').style.display='block';
  document.getElementById('admin-view').style.display='none';
  document.getElementById('pwd-inp').value='';
}

function fillAdmin(){
  document.getElementById('a-name').value=D.name||'';
  document.getElementById('a-start').value=D.startDate||'';
  document.getElementById('a-end').value=D.endDate||'';
  renderAdminPlayers();
}

function renderAdminPlayers(){
  const c=document.getElementById('admin-players');
  c.innerHTML='';
  D.players.forEach((p,i)=>{
    const loss=(p.sw&&p.ew!==null&&p.ew!==undefined)
      ?`<div class="calc-val">${(p.sw-p.ew).toFixed(2)} kg</div>`
      :`<div class="calc-val empty">未录入</div>`;
    const div=document.createElement('div');
    div.className='p-row';
    div.innerHTML=`
      <div class="p-row-head">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:26px;cursor:pointer" title="点击换头像" onclick="nextEmoji(${i})">${p.emoji}</span>
          <input type="text" class="form-inp" style="width:110px;margin:0" value="${p.name}"
            placeholder="姓名" oninput="D.players[${i}].name=this.value">
        </div>
        <button class="btn-del" onclick="removePlayer(${i})">删除</button>
      </div>
      <div class="w-grid">
        <div>
          <label class="form-lbl">起始体重(kg)</label>
          <input type="number" class="form-inp" style="margin:0" value="${p.sw||''}"
            placeholder="80.0" step="0.05" min="30" max="300"
            oninput="D.players[${i}].sw=parseFloat(this.value)||null;renderAdminPlayers()">
        </div>
        <div>
          <label class="form-lbl">结束体重(kg)</label>
          <input type="number" class="form-inp" style="margin:0" value="${p.ew!==null&&p.ew!==undefined?p.ew:''}"
            placeholder="75.0" step="0.05" min="30" max="300"
            oninput="D.players[${i}].ew=this.value===''?null:parseFloat(this.value);renderAdminPlayers()">
        </div>
        <div>
          <label class="form-lbl">减重</label>
          ${loss}
        </div>
      </div>`;
    c.appendChild(div);
  });
}

function nextEmoji(i){
  const idx=EMOJIS.indexOf(D.players[i].emoji);
  D.players[i].emoji=EMOJIS[(idx+1)%EMOJIS.length];
  renderAdminPlayers();
}

function addPlayer(){
  D.players.push({id:Date.now(),emoji:EMOJIS[D.players.length%EMOJIS.length],name:'新选手',sw:null,ew:null});
  renderAdminPlayers();
}

function removePlayer(i){D.players.splice(i,1);renderAdminPlayers()}

function doSave(){
  D.name=document.getElementById('a-name').value||D.name;
  D.startDate=document.getElementById('a-start').value;
  D.endDate=document.getElementById('a-end').value;
  saveData();render();toast('✅ 已保存！');
}

// ─────────────────────────────────────────────
//  SHARE
// ─────────────────────────────────────────────
function copyFixed(){
  const url='https://liqianshu520-png.github.io/slim-challenge/';
  if(navigator.share){
    navigator.share({title:'🏆 减脂挑战赛排行榜',text:'快来看谁减得最多！',url}).catch(()=>copyURL(url));
  } else { copyURL(url); }
}

function copyURL(u){
  if(navigator.clipboard){
    navigator.clipboard.writeText(u).then(()=>toast('✅ 链接已复制！发到群里吧 🚀'));
  } else {
    const t=document.createElement('textarea');
    t.value=u;t.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(t);t.select();document.execCommand('copy');
    document.body.removeChild(t);toast('✅ 链接已复制！');
  }
}

// ─────────────────────────────────────────────
//  WELCOME CELEBRATION
// ─────────────────────────────────────────────
let welcomed=sessionStorage.getItem('welcomed');

function checkWelcome(){
  const r=ranked();const done=r.filter(p=>p.done);
  const over=isOver()||done.length===r.length;
  if(over&&done.length>0&&!welcomed){
    const champ=done[0];
    document.getElementById('w-crown').textContent=champ.emoji;
    const photoEl=document.getElementById('w-photo');
    const photoSrc=D.photos&&D.photos[champ.name];
    if(photoSrc){photoEl.src=photoSrc;photoEl.style.display='block';}
    else{photoEl.style.display='none';}
    document.getElementById('w-title').textContent=`🎉 ${champ.name} 是本期冠军！`;
    document.getElementById('w-sub').textContent=`太厉害了！成功减重 ${champ.loss} kg！`;
    document.getElementById('welcome').classList.remove('hidden');
    startConfetti();startStars();
    setTimeout(closeWelcome,6000);
  } else {
    document.getElementById('welcome').classList.add('hidden');
  }
}

function closeWelcome(){
  const el=document.getElementById('welcome');
  el.style.transition='opacity .5s';el.style.opacity='0';
  setTimeout(()=>{el.classList.add('hidden');el.style.opacity='';el.style.transition='';},500);
  sessionStorage.setItem('welcomed','1');welcomed='1';
  stopConfetti();
}

// ─────────────────────────────────────────────
//  CONFETTI
// ─────────────────────────────────────────────
const COLORS=['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#a78bfa','#f9a8d4'];
let cfActive=false,cfParts=[];

function startConfetti(){
  const cv=document.getElementById('confetti-canvas');
  const ctx=cv.getContext('2d');
  cv.width=innerWidth;cv.height=innerHeight;
  cfActive=true;cfParts=[];
  for(let i=0;i<200;i++){
    cfParts.push({
      x:Math.random()*cv.width,y:-20-Math.random()*cv.height*.5,
      w:5+Math.random()*10,h:3+Math.random()*6,
      color:COLORS[Math.floor(Math.random()*COLORS.length)],
      spd:2+Math.random()*4,drift:(Math.random()-.5)*2,
      spin:(Math.random()-.5)*.25,ang:Math.random()*Math.PI*2,
    });
  }
  (function loop(){
    ctx.clearRect(0,0,cv.width,cv.height);
    cfParts.forEach(p=>{p.y+=p.spd;p.x+=p.drift;p.ang+=p.spin;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.ang);
      ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
    });
    cfParts=cfParts.filter(p=>p.y<cv.height+20);
    if(cfActive||cfParts.length)requestAnimationFrame(loop);
    else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}

function stopConfetti(){cfActive=false}

// ─────────────────────────────────────────────
//  STAR FIELD (welcome bg)
// ─────────────────────────────────────────────
function startStars(){
  const cv=document.getElementById('star-canvas');
  const ctx=cv.getContext('2d');
  cv.width=innerWidth;cv.height=innerHeight;
  const stars=Array.from({length:80},()=>({
    x:Math.random()*cv.width,y:Math.random()*cv.height,
    r:Math.random()*2+.5,a:Math.random(),da:.005+Math.random()*.015,
  }));
  (function loop(){
    ctx.clearRect(0,0,cv.width,cv.height);
    stars.forEach(s=>{
      s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.fill();
    });
    if(!document.getElementById('welcome').classList.contains('hidden'))requestAnimationFrame(loop);
  })();
}

// ─────────────────────────────────────────────
//  BACKGROUND PARTICLES
// ─────────────────────────────────────────────
(function bgAnim(){
  const cv=document.getElementById('bg-canvas');
  const ctx=cv.getContext('2d');
  cv.width=innerWidth;cv.height=innerHeight;
  const pts=Array.from({length:35},()=>({
    x:Math.random()*cv.width,y:Math.random()*cv.height,
    r:1+Math.random()*2.5,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,
    c:`hsla(${200+Math.random()*80},80%,70%,.6)`,
  }));
  (function loop(){
    ctx.clearRect(0,0,cv.width,cv.height);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>cv.width)p.vx*=-1;if(p.y<0||p.y>cv.height)p.vy*=-1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.c;ctx.fill();
    });
    requestAnimationFrame(loop);
  })();
  addEventListener('resize',()=>{cv.width=innerWidth;cv.height=innerHeight;});
})();

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
let toastTmr;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTmr);toastTmr=setTimeout(()=>t.classList.remove('show'),3000);
}

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
loadData();
render();
checkWelcome();
</script>
